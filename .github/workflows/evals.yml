name: Evals

on:
  push:
    branches: [main]
    paths: [src/**, evals/**, tests/dummy_server.py, tests/subtle_server.py, tests/chain_honeypot_server.py, pyproject.toml]
  pull_request:
    branches: [main]
    paths: [src/**, evals/**, tests/dummy_server.py, tests/subtle_server.py, tests/chain_honeypot_server.py, pyproject.toml]

jobs:
  judge-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --dev

      - name: Run judge eval
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: uv run python -m evals.run_judge_eval

  e2e-eval:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --dev

      - name: Run e2e evals
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: uv run python -m evals.run_evals --runs 2 --budget 7
